name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes to prevent Render's 15-minute sleep
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          # Use the secret RENDER_BACKEND_URL if available, otherwise fallback to a placeholder or error out
          URL="${{ secrets.RENDER_BACKEND_URL }}"
          
          if [ -z "$URL" ]; then
            echo "❌ Error: RENDER_BACKEND_URL secret is not set in GitHub Repository Secrets."
            echo "Please go to Settings > Secrets and variables > Actions and add RENDER_BACKEND_URL."
            exit 1
          fi
          
          echo "pinging $URL/api/health..."
          RESPONSE=$(curl -s -w "\n%{http_code}" "$URL/api/health")
          BODY=$(echo "$RESPONSE" | head -n 1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Success: $BODY"
          else
            echo "⚠️ Failed with status $STATUS: $BODY"
            exit 1
          fi
